[package]
name = "hawkeye-desktop"
version = "0.1.0"
description = "Hawkeye Desktop - AI-Powered Screen Assistant"
authors = ["Hawkeye Team"]
license = "MIT"
repository = "https://github.com/anthropics/hawkeye"
edition = "2021"
rust-version = "1.70"

[lib]
name = "hawkeye_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

# The Tauri webview app — same as the auto-discovered default but explicit
# so we can sit alongside `hawkeye-cli` without ambiguity.
[[bin]]
name = "hawkeye-desktop"
path = "src/main.rs"

# Headless / scriptable CLI that drives the same subsystems (observe loop,
# AI providers, agent runner) without booting Tauri or a webview.
[[bin]]
name = "hawkeye-cli"
path = "src/bin/cli.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# Tauri
tauri = { version = "2", features = ["macos-private-api", "tray-icon"] }
tauri-plugin-shell = "2"
tauri-plugin-fs = "2"
tauri-plugin-dialog = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-updater = "2"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Error handling
thiserror = "1"
anyhow = "1"

# Screen capture
screenshots = "0.8"

# Image processing
image = "0.25"

# HTTP client (for AI API calls)
reqwest = { version = "0.12", features = ["json", "stream"] }

# Async stream utilities
futures-util = "0.3"

# Async trait support
async-trait = "0.1"

# Logging
log = "0.4"
env_logger = "0.11"

# Local LLM inference (llama.cpp Rust bindings, Metal for macOS GPU)
llama-cpp-2 = { version = "0.1", default-features = false, features = ["metal"] }
encoding_rs = "0.8"

# Utilities
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"
base64 = "0.22"
open = "5"
dirs = "6"
glob = "0.3"

# CLI argument parsing for the headless `hawkeye-cli` binary.
clap = { version = "4", features = ["derive"] }

[target.'cfg(target_os = "macos")'.dependencies]
cocoa = "0.26"
objc = "0.2"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
